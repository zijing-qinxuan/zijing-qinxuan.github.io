<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#102740">
  <meta name="robots" content="noindex, nofollow">
  <title>Developer Mode｜Wedding Website Preview</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --navy: #102740;
      --gold: #c9a96a;
      --ivory: #f7f4ed;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      overflow-x: hidden;
      color: white;
      background: var(--navy);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .background {
      position: fixed;
      inset: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 35%;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(7, 20, 36, .38), rgba(7, 20, 36, .72));
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: auto;
      padding: 72px 0 40px;
      text-align: center;
    }

    .panel {
      padding: clamp(40px, 7vw, 64px);
      background: rgba(247, 244, 237, .13);
      border: 1px solid rgba(255, 255, 255, .24);
      border-radius: 32px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, .2);
      -webkit-backdrop-filter: blur(24px) saturate(125%);
      backdrop-filter: blur(24px) saturate(125%);
      animation: enter .7s ease-out both;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--gold);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .28em;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(42px, 8vw, 68px);
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: .02em;
    }

    .subtitle {
      margin: 13px 0 0;
      color: rgba(255, 255, 255, .8);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px;
      letter-spacing: .1em;
    }

    .intro {
      margin: 27px auto 36px;
      color: rgba(255, 255, 255, .72);
      line-height: 1.9;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .mode-button {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 14px 20px;
      color: var(--navy);
      background: rgba(255, 255, 255, .9);
      border: 1px solid rgba(255, 255, 255, .7);
      border-radius: 999px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, .09);
      font-size: 15px;
      font-weight: 650;
      text-decoration: none;
      transition: color .35s ease, background .35s ease, transform .35s ease, box-shadow .35s ease;
    }

    .mode-button:hover {
      color: white;
      background: var(--gold);
      transform: translateY(-3px) scale(1.018);
      box-shadow: 0 18px 38px rgba(0, 0, 0, .18);
    }

    .mode-button:active { transform: scale(.98); }

    .mode-button:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 4px;
    }

    .current-mode {
      margin: 35px 0 0;
      padding-top: 25px;
      border-top: 1px solid rgba(201, 169, 106, .38);
      color: rgba(255, 255, 255, .64);
      font-size: 13px;
      letter-spacing: .06em;
    }

    .current-mode strong {
      margin-left: 6px;
      color: white;
      font-weight: 600;
    }

    .seat-preview {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid rgba(201, 169, 106, .38);
    }

    .seat-preview p {
      margin: 0 0 14px;
      color: rgba(255, 255, 255, .72);
      font-size: 13px;
      letter-spacing: .06em;
    }

    .seat-preview-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .seat-preview-button {
      min-height: 44px;
      padding: 10px 14px;
      color: white;
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .28);
      border-radius: 999px;
      font: inherit;
      cursor: pointer;
    }

    .seat-preview-button[aria-pressed="true"] {
      color: var(--navy);
      background: rgba(255, 255, 255, .9);
      border-color: rgba(255, 255, 255, .7);
    }

    .seat-preview-button:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
    }

    footer {
      padding: 24px 20px max(24px, env(safe-area-inset-bottom));
      text-align: center;
      text-shadow: 0 1px 12px rgba(0, 0, 0, .3);
    }

    footer p { margin: 0; font-size: 12px; letter-spacing: .16em; }
    footer small { display: block; margin-top: 4px; color: rgba(255, 255, 255, .5); }

    @keyframes enter {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 620px) {
      .background { object-position: 52% 42%; }
      main { padding-top: 40px; }
      .panel { padding: 42px 22px; border-radius: 28px; }
      .mode-grid { grid-template-columns: 1fr; }
      .mode-button { width: 100%; }
      .seat-preview-options { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <img class="background" src="assets/hero.jpg" alt="" fetchpriority="high">
  <div class="overlay" aria-hidden="true"></div>

  <main>
    <section class="panel" aria-labelledby="page-title">
      <p class="eyebrow">DEVELOPER TOOLS</p>
      <h1 id="page-title">Developer Mode</h1>
      <p class="subtitle">Wedding Website Preview</p>
      <p class="intro">快速切換不同邀請模式，<br>方便測試網站。</p>

      <nav class="mode-grid" aria-label="邀請模式預覽">
        <a class="mode-button" href="index.html?invite=full"><span aria-hidden="true">💍</span> 婚禮＋婚宴</a>
        <a class="mode-button" href="index.html?invite=wedding"><span aria-hidden="true">⛪</span> 僅婚禮</a>
        <a class="mode-button" href="index.html?invite=online"><span aria-hidden="true">💻</span> 線上參加</a>
        <a class="mode-button" href="index.html"><span aria-hidden="true">🏠</span> Landing Page</a>
      </nav>

      <div class="seat-preview" id="seat-preview" hidden>
        <p>座位查詢開放狀態</p>
        <div class="seat-preview-options">
          <button class="seat-preview-button" type="button" data-seat-preview="actual" aria-pressed="false">實際日期</button>
          <button class="seat-preview-button" type="button" data-seat-preview="before" aria-pressed="false">模擬尚未開放</button>
          <button class="seat-preview-button" type="button" data-seat-preview="open" aria-pressed="false">模擬已開放</button>
        </div>
      </div>

      <p class="current-mode">目前模式：<strong id="current-mode">Landing Page</strong></p>
    </section>
  </main>

  <footer>
    <p>Developer Tools</p>
    <small>Version 1.0</small>
  </footer>

  <script>
    const modeNames = {
      full: '婚禮＋婚宴',
      wedding: '僅婚禮',
      online: '線上參加'
    };

    const currentInvite = new URLSearchParams(window.location.search).get('invite');
    document.querySelector('#current-mode').textContent = modeNames[currentInvite] || 'Landing Page';

    const seatPreview = document.querySelector('#seat-preview');
    const seatPreviewButtons = [...document.querySelectorAll('[data-seat-preview]')];
    const seatPreviewKey = 'wedding-seat-lookup-preview';
    const localDevelopmentHosts = ['localhost', '127.0.0.1', '::1', '[::1]'];

    if (localDevelopmentHosts.includes(window.location.hostname)) {
      seatPreview.hidden = false;

      const syncSeatPreview = () => {
        const currentPreview = window.sessionStorage.getItem(seatPreviewKey) || 'actual';
        seatPreviewButtons.forEach((button) => {
          button.setAttribute('aria-pressed', String(button.dataset.seatPreview === currentPreview));
        });
      };

      seatPreviewButtons.forEach((button) => {
        button.addEventListener('click', () => {
          if (button.dataset.seatPreview === 'actual') window.sessionStorage.removeItem(seatPreviewKey);
          else window.sessionStorage.setItem(seatPreviewKey, button.dataset.seatPreview);
          syncSeatPreview();
        });
      });

      syncSeatPreview();
    }
  </script>
</body>
</html>
